server.port=0
spring.application.name=HL7FHIRTransformer-Test

# Admin
app.admin.username=admin
app.admin.password=password

# Logging
logging.level.com.al.hl7fhirtransformer=DEBUG

# Mock MongoDB
spring.data.mongodb.uri=mongodb://admin:supersecret@localhost:27017/test?authSource=admin

# Mock RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=supersecret
app.rabbitmq.retry.base-name=test-hl7
app.rabbitmq.fhir.retry.base-name=test-fhir

# Application Queues (Declarations for tests)
app.rabbitmq.exchange=test-exchange
app.rabbitmq.routingkey=test.routing
app.rabbitmq.queue=test-queue
app.rabbitmq.output-queue=test-output-queue
app.rabbitmq.dlq=test-dlq
app.rabbitmq.dlx=test-dlx
app.rabbitmq.dl-routingkey=test.dl.routing

app.rabbitmq.fhir.exchange=test-fhir-exchange
app.rabbitmq.fhir.routingkey=test.fhir.routing
app.rabbitmq.fhir.queue=test-fhir-queue
app.rabbitmq.v2.output-queue=test-v2-output-queue
app.rabbitmq.fhir.dlq=test-fhir-dlq
app.rabbitmq.fhir.dlx=test-fhir-dlx
app.rabbitmq.fhir.dl-routingkey=test.fhir.dl.routing

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.main.allow-bean-definition-overriding=true
